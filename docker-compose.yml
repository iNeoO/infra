services:
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: rabbitmq-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
    ports:
      - "127.0.0.1:15673:15672"
    volumes:
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - rabbitmq-network
      - monitoring-shared

  redis:
    image: redis:8-alpine
    container_name: redis-prod
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data
    networks:
      - monitoring-shared
      - redis-network

  garage:
    image: dxflrs/garage:v2.3.0
    container_name: garage-prod
    restart: unless-stopped
    volumes:
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
      - ./garage/garage.toml:/etc/garage.toml:ro
    ports:
      - "127.0.0.1:${GARAGE_S3_PORT}:3900"
      - "127.0.0.1:${GARAGE_ADMIN_PORT}:3903"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3903/health 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - garage-network
      - monitoring-shared

volumes:
  rabbitmq-data:
  redis-data:
  garage-meta:
  garage-data:

networks:
  rabbitmq-network:
    name: ${RABBITMQ_NETWORK:-rabbitmq-network}
    external: true
  redis-network:
    name: ${REDIS_NETWORK:-redis-network}
    external: true
  garage-network:
    name: ${GARAGE_NETWORK:-garage-network}
    external: true
  monitoring-shared:
    name: ${MONITORING_SHARED_NETWORK:-monitoring-shared}
    external: true
