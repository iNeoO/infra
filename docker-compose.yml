services:
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: rabbitmq-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
    ports:
      - "127.0.0.1:15673:15672"
    volumes:
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - rabbitmq-network
      - monitoring-shared

  redis:
    image: redis:8-alpine
    container_name: redis-prod
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--aclfile",
        "/etc/redis/users.acl",
        "--appendonly",
        "yes",
      ]
    environment:
      REDIS_HEALTHCHECK_PASSWORD: ${REDIS_HEALTHCHECK_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "REDISCLI_AUTH=\"$${REDIS_HEALTHCHECK_PASSWORD}\" redis-cli --user healthcheck ping",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data
      - ./redis/users.acl:/etc/redis/users.acl:ro
    networks:
      - monitoring-shared
      - redis-network

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0-alpine
    container_name: redis-exporter-prod
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis-prod:6379
      REDIS_USER: exporter
      REDIS_PASSWORD: ${REDIS_EXPORTER_PASSWORD}
    networks:
      - redis-network
      - monitoring-shared
    depends_on:
      - redis

  garage:
    image: dxflrs/garage:v2.3.0
    container_name: garage-prod
    restart: unless-stopped
    volumes:
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
      - ./garage/garage.toml:/etc/garage.toml:ro
    ports:
      - "127.0.0.1:${GARAGE_S3_PORT}:3900"
      - "127.0.0.1:${GARAGE_ADMIN_PORT}:3903"
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - garage-network
      - monitoring-shared

volumes:
  rabbitmq-data:
  redis-data:
  garage-meta:
  garage-data:

networks:
  rabbitmq-network:
    name: ${RABBITMQ_NETWORK:-rabbitmq-network}
    external: true
  redis-network:
    name: ${REDIS_NETWORK:-redis-network}
    external: true
  garage-network:
    name: ${GARAGE_NETWORK:-garage-network}
    external: true
  monitoring-shared:
    name: ${MONITORING_SHARED_NETWORK:-monitoring-shared}
    external: true
